services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowflow
    ports:
      - "5432:5432"
    volumes:
      - knowflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  knowflow-postgres-data:
